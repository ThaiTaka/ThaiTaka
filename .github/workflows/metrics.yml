name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }} # Cần tạo Personal Access Token
          # Cài đặt plugin Isometric Calendar để có giao diện 3D
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
